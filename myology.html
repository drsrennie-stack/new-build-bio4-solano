<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myology Atlas — Interactive Study Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Paper / surfaces — light cream ── */
  --paper:        #FBF9F3;
  --paper-2:      #F2EEE3;
  --paper-3:      #E6E0D1;
  --surface:      #FFFFFF;
  --surface-2:    #FCFAF5;
  --rule:         #E2DCCD;
  --rule-soft:    #EDE8DB;

  /* ── Ink — navy family ── */
  --ink:          #0B1530;
  --ink-2:        #2A3350;
  --ink-3:        #55607A;
  --ink-4:        #8A93A6;
  --ink-5:        #B6BCCB;

  /* ── Accent — rust ── */
  --accent:       #8B3A2E;
  --accent-2:     #A0452F;
  --accent-soft:  rgba(139, 58, 46, 0.07);
  --accent-line:  rgba(139, 58, 46, 0.22);

  /* ── Sidebar (white) ── */
  --sb-bg:        #FFFFFF;
  --sb-bg-2:      #FCFAF5;
  --sb-text:      #0B1530;
  --sb-text-dim:  #55607A;
  --sb-text-mute: #8A93A6;
  --sb-rule:      #E8E3D6;
  --sb-hover:     rgba(11, 21, 48, 0.04);
  --sb-active:    rgba(139, 58, 46, 0.07);
  --sb-accent:    #8B3A2E;

  /* ── Column colors — brand triad + harmonious teal & indigo ── */
  --c-o:          #8B3A2E;   /* rust   — Origin */
  --c-i:          #2F6B5E;   /* teal   — Insertion */
  --c-a:          #9A7A1C;   /* gold   — Action */
  --c-n:          #4E4A86;   /* indigo — Nerve */

  --c-o-soft:     rgba(139, 58, 46, 0.06);
  --c-i-soft:     rgba(47, 107, 94, 0.06);
  --c-a-soft:     rgba(154, 122, 28, 0.07);
  --c-n-soft:     rgba(78, 74, 134, 0.06);

  --c-o-tint:     rgba(139, 58, 46, 0.14);
  --c-i-tint:     rgba(47, 107, 94, 0.14);
  --c-a-tint:     rgba(154, 122, 28, 0.16);
  --c-n-tint:     rgba(78, 74, 134, 0.14);

  /* ── Right panel surfaces ── */
  --rp-card:      #FFFFFF;
  --rp-strip:     #FCFAF5;

  --focus:        #8B3A2E;
  --shadow-sm:    0 1px 2px rgba(11, 21, 48, 0.06);
  --shadow-md:    0 4px 12px rgba(11, 21, 48, 0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink);
  background: var(--paper);
  background-image:
    radial-gradient(ellipse at 85% 80%, rgba(139, 58, 46, 0.025), transparent 55%);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Skip link / a11y ── */
.skip-link {
  position: absolute; top: -100px; left: 8px; z-index: 9999;
  background: var(--accent); color: #fff; padding: 12px 18px;
  border-radius: 0 0 4px 4px; font-weight: 600; font-size: 13px;
  text-decoration: none; transition: top 0.15s;
}
.skip-link:focus { top: 0; }
:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: 3px; }

#sr-status {
  position: absolute; width: 1px; height: 1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap;
}

/* ── Layout shell ── */
#shell { display: flex; align-items: flex-start; min-height: 100vh; }

/* ════════════════════════════════════════
   SIDEBAR
   ════════════════════════════════════════ */
#sidebar {
  width: 276px;
  min-width: 276px;
  background: var(--sb-bg);
  color: var(--sb-text);
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  scrollbar-width: thin;
  scrollbar-color: #CCC6B6 transparent;
  border-right: 1px solid var(--sb-rule);
}
#sidebar::-webkit-scrollbar { width: 5px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: #CCC6B6; border-radius: 4px; }

#sb-header {
  padding: 28px 24px 22px;
  border-bottom: 1px solid var(--sb-rule);
}
.brand-lockup {
  display: flex;
  align-items: center;
  gap: 13px;
}
.brand-logo {
  height: 46px;
  width: auto;
  flex-shrink: 0;
  display: block;
}
.brand-words { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.brand-mark {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  font-size: 21px;
  line-height: 1;
  color: var(--sb-text);
  letter-spacing: -0.02em;
}
.brand-mark .brand-accent { color: var(--sb-accent); }
.brand-tag {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--sb-text-dim);
  font-weight: 700;
  line-height: 1.3;
}

#sb-nav { padding: 8px 0 14px; flex: 1; }
.sb-group { padding: 8px 0 2px; }
.sb-group-label {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.24em;
  color: var(--sb-text-mute);
  font-weight: 600;
  padding: 8px 24px 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sb-group-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--sb-rule);
}

.sb-btn {
  display: block;
  width: 100%;
  padding: 10px 22px 10px 20px;
  border: none;
  background: none;
  color: var(--sb-text);
  opacity: 0.78;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  text-align: left;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s;
  position: relative;
}
.sb-btn:hover {
  opacity: 1;
  background: var(--sb-hover);
}
.sb-btn.active {
  opacity: 1;
  background: var(--sb-active);
  border-left-color: var(--sb-accent);
  color: var(--sb-text);
  font-weight: 700;
}
.sb-btn-top {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 6px;
}
.sb-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sb-name { flex: 1; }
.sb-count {
  font-size: 10.5px;
  font-weight: 500;
  color: var(--sb-text-mute);
  font-variant-numeric: tabular-nums;
}
.sb-btn.active .sb-count { color: var(--sb-text-dim); }

.sb-progress {
  height: 2px;
  background: rgba(11, 21, 48, 0.07);
  border-radius: 2px;
  overflow: hidden;
}
.sb-progress-fill {
  height: 100%;
  background: var(--sb-accent);
  border-radius: 2px;
  transition: width 0.3s;
  opacity: 0.85;
}

#sb-foot {
  padding: 16px 24px 22px;
  border-top: 1px solid var(--sb-rule);
  background: var(--sb-bg-2);
}
.foot-label {
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--sb-text-mute);
  font-weight: 600;
  margin-bottom: 8px;
}
.foot-stat {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--sb-text-dim);
  padding: 3px 0;
}
.foot-stat strong {
  color: var(--sb-text);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.foot-reset {
  width: 100%;
  margin-top: 12px;
  padding: 8px 12px;
  border: 1px solid var(--sb-rule);
  background: transparent;
  color: var(--sb-text-dim);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
}
.foot-reset:hover {
  background: rgba(139, 58, 46, 0.06);
  border-color: var(--sb-accent);
  color: var(--sb-accent);
}

/* ════════════════════════════════════════
   MAIN
   ════════════════════════════════════════ */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* ── Header zone ── */
#header-zone {
  background: var(--surface);
  border-bottom: 1px solid var(--rule);
  padding: 22px 32px 14px;
}
.header-row-top {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.cat-title-block { min-width: 0; flex: 1; }
.cat-eyebrow {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.24em;
  color: var(--ink-3);
  font-weight: 600;
  margin-bottom: 4px;
}
#cat-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 38px;
  line-height: 1.05;
  color: var(--ink);
  letter-spacing: -0.028em;
}
.cat-subtitle {
  margin-top: 6px;
  font-size: 13.5px;
  color: var(--ink-3);
  font-weight: 400;
}

/* Search */
.search-wrap {
  position: relative;
  width: 280px;
  flex-shrink: 0;
}
.search-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--ink-4);
  pointer-events: none;
}
#search {
  width: 100%;
  padding: 9px 36px 9px 36px;
  border: 1px solid var(--rule);
  background: var(--paper);
  color: var(--ink);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13.5px;
  border-radius: 4px;
  transition: all 0.15s;
}
#search::placeholder { color: var(--ink-4); }
#search:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 22px;
  height: 22px;
  border: none;
  background: var(--paper-2);
  color: var(--ink-3);
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  display: none;
  align-items: center;
  justify-content: center;
}
.search-clear.visible { display: flex; }

/* Controls row */
.header-row-bot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}
.ctrl-group {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.toggle {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.toggle-label {
  font-size: 12px;
  color: var(--ink-2);
  font-weight: 500;
  letter-spacing: 0.02em;
}
.tsw {
  position: relative;
  display: inline-block;
  width: 32px;
  height: 18px;
  flex-shrink: 0;
}
.tsw input {
  opacity: 0;
  width: 0;
  height: 0;
  position: absolute;
}
.tsw-track {
  position: absolute;
  inset: 0;
  background: var(--paper-3);
  border-radius: 18px;
  transition: 0.18s;
  border: 1px solid var(--rule);
}
.tsw input:checked + .tsw-track {
  background: var(--accent);
  border-color: var(--accent);
}
.tsw-thumb {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 12px;
  height: 12px;
  background: #fff;
  border-radius: 50%;
  transition: 0.18s;
  pointer-events: none;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
.tsw input:checked ~ .tsw-thumb { left: 16px; }

.action-btn {
  padding: 7px 14px;
  border-radius: 3px;
  border: 1px solid var(--rule);
  background: var(--surface);
  color: var(--ink-2);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.action-btn:hover {
  background: var(--accent-soft);
  border-color: var(--accent-line);
  color: var(--accent);
}
.action-btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.action-btn-primary:hover {
  background: var(--accent-2);
  border-color: var(--accent-2);
  color: #fff;
}

/* ── Legend / Progress strip ── */
#strip {
  display: flex;
  align-items: center;
  gap: 32px;
  padding: 12px 32px;
  background: var(--paper-2);
  border-bottom: 1px solid var(--rule);
  flex-wrap: wrap;
}
.legend-block {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11.5px;
  font-weight: 500;
  color: var(--ink-2);
  letter-spacing: 0.04em;
}
.leg-swatch {
  width: 14px;
  height: 3px;
  border-radius: 2px;
}
.progress-block {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 200px;
  margin-left: auto;
}
#score-txt {
  font-size: 11.5px;
  color: var(--ink-2);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
#prog-track {
  flex: 1;
  height: 5px;
  background: var(--paper-3);
  border-radius: 5px;
  overflow: hidden;
  position: relative;
}
#prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--c-a), var(--c-i));
  border-radius: 5px;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0;
}
#pct-txt {
  font-size: 11.5px;
  color: var(--ink-3);
  font-weight: 600;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  min-width: 36px;
  text-align: right;
}

/* ════════════════════════════════════════
   TABLE
   ════════════════════════════════════════ */
#table-wrap {
  padding: 24px 32px 80px;
  background: transparent;
}

.section-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin: 28px 0 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
}
.section-header:first-child { margin-top: 4px; }
.section-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 600;
  font-size: 17px;
  color: var(--ink);
  letter-spacing: -0.015em;
}
.section-count {
  font-size: 11px;
  color: var(--ink-3);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-variant-numeric: tabular-nums;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 5px;
  min-width: 720px;
}
thead th {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  padding: 8px 12px;
  text-align: left;
  color: var(--ink-3);
  background: transparent;
  border-bottom: 1px solid var(--rule);
  vertical-align: bottom;
}
thead th:first-child { padding-left: 0; width: 92px; }
thead th.muscle-col { width: 21%; }
thead th.col-o { color: var(--c-o); width: 19%; }
thead th.col-i { color: var(--c-i); width: 19%; }
thead th.col-a { color: var(--c-a); width: 22%; }
thead th.col-n { color: var(--c-n); width: 15%; }

tbody tr { transition: opacity 0.2s; }
tbody tr.excluded { opacity: 0.38; }
tbody tr.excluded .muscle-name-text { text-decoration: line-through; text-decoration-thickness: 1px; }
tbody tr.hidden-row { display: none; }

td { padding: 0; vertical-align: stretch; height: 1px; }

/* Skip + Scope toggle cell — stacked labeled pills */
td.skip-col { width: 92px; padding: 0 8px 0 0; }
.row-toggles {
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: stretch;
  justify-content: center;
  padding: 4px 0;
  height: 100%;
}
.row-toggle-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 4px 8px;
  min-height: 22px;
  border: 1px solid var(--rule);
  background: var(--surface);
  color: var(--ink-3);
  border-radius: 11px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
}
.row-toggle-btn .pill-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ink-5);
  transition: background 0.15s;
  flex-shrink: 0;
}
/* Skip — muted gray when active (subtractive) */
.skip-btn:hover {
  border-color: var(--ink-3);
  color: var(--ink);
  background: rgba(11, 21, 48, 0.03);
}
.skip-btn.checked {
  background: var(--ink-3);
  border-color: var(--ink-3);
  color: #fff;
}
.skip-btn.checked .pill-dot { background: #fff; }
/* In-scope — oxblood when active (selective) */
.scope-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}
.scope-btn:hover .pill-dot { background: var(--accent); }
.scope-btn.checked {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.scope-btn.checked .pill-dot { background: #fff; }

/* Muscle name cell — clickable to open detail panel */
.muscle-name {
  padding: 12px 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 600;
  font-size: 14.5px;
  color: var(--ink);
  line-height: 1.3;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-right: none;
  border-radius: 4px 0 0 4px;
  min-height: 50px;
  height: 100%;
  display: flex;
  align-items: center;
  gap: 9px;
  letter-spacing: -0.015em;
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
}
.muscle-name:hover {
  background: var(--accent-soft);
}
.muscle-name:hover .muscle-name-text {
  color: var(--accent);
}
.muscle-name.active-detail {
  background: var(--accent-soft);
  border-color: var(--accent);
}
.muscle-name.active-detail .muscle-name-text {
  color: var(--accent);
}
.row-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.muscle-name-text { flex: 1; }

/* Cell buttons */
.cell-btn {
  display: block;
  width: 100%;
  height: 100%;
  min-height: 50px;
  padding: 11px 14px;
  border: 1px solid var(--rule);
  border-left: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 400;
  line-height: 1.42;
  text-align: left;
  cursor: pointer;
  transition: all 0.12s;
  background: var(--paper-2);
  color: transparent;
  position: relative;
  overflow: hidden;
  letter-spacing: 0.005em;
}

/* Subtle pattern on hidden cells (dot texture) */
.cell-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, var(--ink-5) 0.7px, transparent 1px);
  background-size: 10px 10px;
  background-position: 0 0;
  opacity: 0.18;
  pointer-events: none;
  transition: opacity 0.12s;
}
.cell-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: transparent;
  transition: color 0.15s;
  pointer-events: none;
}

.cell-btn:hover {
  background: var(--surface-2);
  border-color: var(--ink-4);
}
.cell-btn:hover::before { opacity: 0; }
.cell-btn:hover::after { content: '+  reveal'; }

td.col-o .cell-btn:hover { border-color: var(--c-o); }
td.col-o .cell-btn:hover::after { color: var(--c-o); }
td.col-i .cell-btn:hover { border-color: var(--c-i); }
td.col-i .cell-btn:hover::after { color: var(--c-i); }
td.col-a .cell-btn:hover { border-color: var(--c-a); }
td.col-a .cell-btn:hover::after { color: var(--c-a); }
td.col-n .cell-btn:hover { border-color: var(--c-n); }
td.col-n .cell-btn:hover::after { color: var(--c-n); }

.cell-btn.revealed {
  background: var(--surface);
  color: var(--ink-2);
  cursor: default;
}
.cell-btn.revealed::before,
.cell-btn.revealed::after { display: none; }
.cell-btn.revealed:hover { background: var(--surface); }

td.col-o .cell-btn.revealed { background: var(--c-o-soft); border-color: var(--c-o-tint); border-left: 3px solid var(--c-o); padding-left: 12px; }
td.col-i .cell-btn.revealed { background: var(--c-i-soft); border-color: var(--c-i-tint); border-left: 3px solid var(--c-i); padding-left: 12px; }
td.col-a .cell-btn.revealed { background: var(--c-a-soft); border-color: var(--c-a-tint); border-left: 3px solid var(--c-a); padding-left: 12px; }
td.col-n .cell-btn.revealed { background: var(--c-n-soft); border-color: var(--c-n-tint); border-left: 3px solid var(--c-n); padding-left: 12px; }

td.col-n .cell-btn { border-radius: 0 4px 4px 0; }

.hide-col { display: none; }

/* Study mode — all visible always */
body.study .cell-btn {
  background: var(--surface);
  color: var(--ink-2);
  cursor: default;
}
body.study .cell-btn::before,
body.study .cell-btn::after { display: none; }
body.study td.col-o .cell-btn { background: var(--c-o-soft); border-left: 3px solid var(--c-o); padding-left: 12px; }
body.study td.col-i .cell-btn { background: var(--c-i-soft); border-left: 3px solid var(--c-i); padding-left: 12px; }
body.study td.col-a .cell-btn { background: var(--c-a-soft); border-left: 3px solid var(--c-a); padding-left: 12px; }
body.study td.col-n .cell-btn { background: var(--c-n-soft); border-left: 3px solid var(--c-n); padding-left: 12px; }

/* Excluded rows: dim & override colors */
tbody tr.excluded .muscle-name,
tbody tr.excluded .cell-btn {
  background: var(--paper-2);
  border-color: var(--rule);
}
tbody tr.excluded td.col-o .cell-btn,
tbody tr.excluded td.col-i .cell-btn,
tbody tr.excluded td.col-a .cell-btn,
tbody tr.excluded td.col-n .cell-btn {
  border-left: 1px solid var(--rule);
  padding-left: 14px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink-3);
  font-size: 14px;
}
.empty-state .ico {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 300;
  font-size: 32px;
  color: var(--ink-4);
  margin-bottom: 10px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(106, 88, 71, 0.25); border-radius: 6px; }
::-webkit-scrollbar-thumb:hover { background: rgba(106, 88, 71, 0.4); }

/* ════════════════════════════════════════
   RIGHT PANEL — Spaced repetition + detail
   ════════════════════════════════════════ */
#right-panel {
  width: 0;
  flex-shrink: 0;
  background: #FFFFFF;
  border-left: 1px solid var(--rule);
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
  transition: width 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
}
#right-panel.open {
  width: 400px;
  min-width: 400px;
}
.rp-inner {
  width: 400px;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

/* Panel header */
.rp-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  background: var(--rp-strip);
  flex-shrink: 0;
}
.rp-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--ink-3);
}
.rp-close {
  width: 28px; height: 28px;
  border: none; background: transparent;
  cursor: pointer; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-3);
}
.rp-close:hover { background: var(--rp-strip); color: var(--ink); border: 1px solid var(--rule); }
.rp-close svg { width: 18px; height: 18px; }

.rp-body { padding: 20px; flex: 1; }

/* ── Idle mode ── */
.rp-idle-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 18px;
}
.rp-stat-card {
  padding: 14px 16px;
  background: var(--rp-card);
  border: 1px solid var(--rule);
  border-radius: 6px;
}
.rp-stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  font-weight: 600;
  margin-bottom: 6px;
}
.rp-stat-num {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -0.025em;
  font-variant-numeric: tabular-nums;
}
.rp-stat-num.due { color: var(--accent); }

.rp-exam-block {
  margin-bottom: 18px;
  padding: 14px 16px;
  background: var(--rp-card);
  border: 1px solid var(--rule);
  border-radius: 6px;
}
.rp-exam-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  font-weight: 600;
  margin-bottom: 8px;
}
.rp-exam-block input[type="date"] {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--rule);
  background: #fff;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13.5px;
  color: var(--ink);
  border-radius: 4px;
}
.rp-exam-block input[type="date"]:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.rp-exam-countdown {
  margin-top: 8px;
  font-size: 12px;
  color: var(--ink-3);
  font-weight: 500;
}
.rp-exam-countdown strong { color: var(--accent); font-weight: 700; }

.rp-start-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}
.rp-start-btn:hover { background: var(--accent-2); }
.rp-start-btn:disabled {
  background: var(--paper-3); color: var(--ink-4); cursor: not-allowed;
}

.rp-section-h {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--ink-3);
  font-weight: 700;
  margin: 22px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
}
.rp-upcoming { list-style: none; padding: 0; }
.rp-upcoming li {
  display: flex; justify-content: space-between;
  padding: 6px 0; font-size: 13px; color: var(--ink-2);
}
.rp-upcoming li strong { color: var(--ink); font-variant-numeric: tabular-nums; font-weight: 700; }

.rp-empty-scope {
  padding: 20px;
  background: var(--rp-strip);
  border: 1px dashed var(--ink-5);
  border-radius: 6px;
  text-align: center;
  font-size: 13px;
  color: var(--ink-3);
  line-height: 1.5;
}
.rp-empty-scope strong { color: var(--ink); }

/* SRS-only reset button at the bottom of the idle panel */
.rp-reset-srs {
  width: 100%;
  margin-top: 10px;
  padding: 9px 12px;
  border: 1px solid var(--rule);
  background: transparent;
  color: var(--ink-3);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.rp-reset-srs:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}
.rp-data-label {
  font-size: 11px;
  color: var(--ink-4);
  line-height: 1.5;
  margin-top: 4px;
}

/* ── Detail mode ── */
.rp-detail-loc {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 4px;
}
.rp-detail-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.1;
  letter-spacing: -0.028em;
  margin-bottom: 18px;
}
.rp-scope-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px;
  background: var(--rp-strip);
  border: 1px solid var(--rule);
  border-radius: 6px;
  margin-bottom: 18px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.rp-scope-row:hover { border-color: var(--accent); }
.rp-scope-row.active {
  background: var(--accent-soft);
  border-color: var(--accent);
}
.rp-scope-check {
  width: 18px; height: 18px;
  border: 1.5px solid var(--ink-5);
  border-radius: 4px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.rp-scope-row.active .rp-scope-check {
  background: var(--accent); border-color: var(--accent);
}
.rp-scope-check svg { width: 12px; height: 12px; color: transparent; }
.rp-scope-row.active .rp-scope-check svg { color: #fff; }
.rp-scope-label { font-size: 13px; font-weight: 600; color: var(--ink); }
.rp-scope-row.active .rp-scope-label { color: var(--accent); }

.rp-field { margin-bottom: 14px; }
.rp-field-label {
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  font-weight: 700;
  margin-bottom: 5px;
}
.rp-field.f-o .rp-field-label { color: var(--c-o); }
.rp-field.f-i .rp-field-label { color: var(--c-i); }
.rp-field.f-a .rp-field-label { color: var(--c-a); }
.rp-field.f-n .rp-field-label { color: var(--c-n); }
.rp-field-text {
  font-size: 13.5px;
  color: var(--ink);
  line-height: 1.5;
  padding-left: 12px;
  border-left: 2px solid var(--rule);
}
.rp-field.f-o .rp-field-text { border-left-color: var(--c-o); }
.rp-field.f-i .rp-field-text { border-left-color: var(--c-i); }
.rp-field.f-a .rp-field-text { border-left-color: var(--c-a); }
.rp-field.f-n .rp-field-text { border-left-color: var(--c-n); }

.rp-notes-ta {
  width: 100%;
  min-height: 70px;
  padding: 10px 12px;
  border: 1px solid var(--rule);
  border-radius: 6px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  color: var(--ink);
  resize: vertical;
  background: var(--rp-card);
}
.rp-notes-ta:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.rp-xref { list-style: none; padding: 0; }
.rp-xref-item {
  padding: 8px 11px;
  border: 1px solid var(--rule);
  border-radius: 4px;
  margin-bottom: 4px;
  font-size: 13px;
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.12s;
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px;
  background: var(--rp-card);
  font-weight: 500;
}
.rp-xref-item:hover { border-color: var(--accent); color: var(--accent); }
.rp-xref-cat {
  font-size: 10px; color: var(--ink-4);
  text-transform: uppercase; letter-spacing: 0.14em;
  font-weight: 600; flex-shrink: 0;
}
.rp-xref-empty {
  font-size: 12.5px; color: var(--ink-4);
  padding: 6px 0;
}

.rp-srs-status {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.rp-srs-cell {
  padding: 10px 12px;
  background: var(--rp-card);
  border: 1px solid var(--rule);
  border-radius: 4px;
}
.rp-srs-cell-label {
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  font-weight: 600;
  margin-bottom: 4px;
}
.rp-srs-cell-value {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--ink);
}

/* ── Review mode ── */
.rp-review-progress {
  padding: 12px 20px;
  background: var(--rp-strip);
  border-bottom: 1px solid var(--rule);
  font-size: 12px;
  color: var(--ink-3);
  font-weight: 500;
  flex-shrink: 0;
}
.rp-review-progress strong { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; }

.rp-card {
  flex: 1;
  padding: 36px 24px 28px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.rp-card-cat {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--ink-3);
  font-weight: 700;
  margin-bottom: 10px;
}
.rp-card-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 30px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.1;
  letter-spacing: -0.03em;
  margin-bottom: 14px;
  max-width: 100%;
  word-break: break-word;
}
.rp-card-prompt {
  font-size: 13px;
  color: var(--ink-3);
  margin-bottom: 28px;
  font-weight: 500;
}
.rp-show-answer {
  padding: 12px 32px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 24px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}
.rp-show-answer:hover { background: var(--ink-2); }

.rp-answer {
  padding: 0 22px 14px;
  text-align: left;
  flex: 1;
  overflow-y: auto;
}
.rp-answer-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 19px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.022em;
  margin-bottom: 4px;
}
.rp-answer-cat {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--ink-3);
  font-weight: 700;
  margin-bottom: 14px;
}

.rp-ratings {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 14px 18px 18px;
  background: var(--rp-strip);
  border-top: 1px solid var(--rule);
  flex-shrink: 0;
}
.rp-rate-btn {
  padding: 10px 4px;
  border: 1.5px solid;
  background: #fff;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: all 0.12s;
}
.rp-rate-btn:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(11,21,48,0.12); }
.rp-rate-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.rp-rate-interval {
  font-size: 10.5px; font-weight: 500;
  color: var(--ink-3); font-variant-numeric: tabular-nums;
}
.rp-rate-btn[data-r="again"] { border-color: #8B3A2E; color: #8B3A2E; }
.rp-rate-btn[data-r="again"]:hover { background: #8B3A2E; color: #fff; }
.rp-rate-btn[data-r="again"]:hover .rp-rate-interval { color: rgba(255,255,255,0.88); }
.rp-rate-btn[data-r="hard"] { border-color: #9A7A1C; color: #9A7A1C; }
.rp-rate-btn[data-r="hard"]:hover { background: #9A7A1C; color: #fff; }
.rp-rate-btn[data-r="hard"]:hover .rp-rate-interval { color: rgba(255,255,255,0.88); }
.rp-rate-btn[data-r="good"] { border-color: #2F6B5E; color: #2F6B5E; }
.rp-rate-btn[data-r="good"]:hover { background: #2F6B5E; color: #fff; }
.rp-rate-btn[data-r="good"]:hover .rp-rate-interval { color: rgba(255,255,255,0.88); }
.rp-rate-btn[data-r="easy"] { border-color: #3E7D63; color: #3E7D63; }
.rp-rate-btn[data-r="easy"]:hover { background: #3E7D63; color: #fff; }
.rp-rate-btn[data-r="easy"]:hover .rp-rate-interval { color: rgba(255,255,255,0.88); }

.rp-done {
  text-align: center;
  padding: 50px 24px;
}
.rp-done-mark {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--c-i);
  color: #fff;
  margin: 0 auto 14px;
  display: flex; align-items: center; justify-content: center;
}
.rp-done-mark svg { width: 32px; height: 32px; }
.rp-done-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
  letter-spacing: -0.022em;
}
.rp-done-sub {
  font-size: 13px;
  color: var(--ink-3);
  margin-bottom: 22px;
}
.rp-done-stats {
  display: flex; justify-content: center; gap: 18px;
  margin-bottom: 24px;
}
.rp-done-stat { text-align: center; }
.rp-done-stat-num {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 22px; font-weight: 700;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.rp-done-stat-label {
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  font-weight: 600;
  margin-top: 2px;
}

/* ── Header SRS controls ── */
.due-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 6px 12px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-line);
  color: var(--accent);
  font-size: 11.5px;
  font-weight: 700;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Plus Jakarta Sans', sans-serif;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.due-badge:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.due-badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
  animation: pulse 1.8s ease-in-out infinite;
}
.due-badge.zero { background: var(--paper-2); border-color: var(--rule); color: var(--ink-3); cursor: default; }
.due-badge.zero:hover { background: var(--paper-2); color: var(--ink-3); border-color: var(--rule); }
.due-badge.zero .due-badge-dot { background: var(--ink-4); animation: none; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.panel-toggle {
  padding: 7px 12px;
  background: var(--surface);
  border: 1px solid var(--rule);
  color: var(--ink-2);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  border-radius: 3px;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}
.panel-toggle:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.panel-toggle svg { width: 13px; height: 13px; }

/* ── Responsive overrides for right panel ── */
@media (max-width: 1280px) {
  #right-panel.open { width: 360px; min-width: 360px; }
  .rp-inner { width: 360px; }
}
@media (max-width: 1080px) {
  #right-panel.open {
    width: 100%;
    min-width: 0;
    position: fixed;
    right: 0;
    top: 0;
    z-index: 100;
    box-shadow: -8px 0 32px rgba(11, 21, 48, 0.15);
    max-width: 420px;
  }
  .rp-inner { width: 100%; max-width: 420px; }
}

/* ── Responsive ── */
@media (max-width: 980px) {
  #sidebar { width: 220px; min-width: 220px; }
  #header-zone { padding: 18px 22px 12px; }
  #cat-title { font-size: 30px; }
  #table-wrap { padding: 20px 22px 60px; }
  #strip { padding: 12px 22px; gap: 22px; }
}
@media (max-width: 760px) {
  #shell { flex-direction: column; }
  #sidebar {
    width: 100%; min-width: 0;
    position: relative; height: auto;
    max-height: 280px;
  }
  .header-row-top { flex-direction: column; align-items: stretch; }
  .search-wrap { width: 100%; }
  #cat-title { font-size: 26px; }
  #table-wrap { padding: 16px; }
  table { min-width: 640px; }
  #strip { padding: 10px 16px; }
}

/* ── Print styles ── */
@media print {

/* ════════════════════════════════════════════════════
   STATE — with localStorage persistence
   ════════════════════════════════════════════════════ */
const STORAGE_KEY = 'myology-atlas-v1';

function defaultState() {
  const reveals = {};
  const excluded = {};
  const examScope = {};
  DATA.forEach(c => {
    reveals[c.id] = {};
    excluded[c.id] = {};
    examScope[c.id] = {};
    let x = 0;
    c.s.forEach(s => s.m.forEach(() => {
      reveals[c.id][x] = { o:false, i:false, a:false, v:false };
      excluded[c.id][x] = false;
      examScope[c.id][x] = false;
      x++;
    }));
  });
  return {
    cur: DATA[0].id,
    quizMode: true,
    showInn: true,
    hideExcl: false,
    search: '',
    reveals,
    excluded,
    examScope,
    cards: {},        // key: "catId:idx" → { interval, dueDate, lastReviewed, reviews }
    notes: {},        // key: "catId:idx" → string
    examDate: '',     // ISO date string (yyyy-mm-dd) or empty
    panel: { open: false, mode: 'detail', detailKey: null },
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const saved = JSON.parse(raw);
    const def = defaultState();
    def.cur = saved.cur && DATA.find(c => c.id === saved.cur) ? saved.cur : def.cur;
    def.quizMode = typeof saved.quizMode === 'boolean' ? saved.quizMode : true;
    def.showInn = typeof saved.showInn === 'boolean' ? saved.showInn : true;
    def.hideExcl = typeof saved.hideExcl === 'boolean' ? saved.hideExcl : false;
    // Sanitize stored exam date — drop if year is obviously wrong (covers stale typo-years)
    if (typeof saved.examDate === 'string' && saved.examDate) {
      const year = Number(saved.examDate.slice(0, 4));
      const currentYear = new Date().getFullYear();
      def.examDate = (year >= currentYear && year <= currentYear + 5) ? saved.examDate : '';
    } else {
      def.examDate = '';
    }
    DATA.forEach(c => {
      let x = 0;
      c.s.forEach(s => s.m.forEach(() => {
        if (saved.reveals?.[c.id]?.[x]) {
          def.reveals[c.id][x] = {
            o: !!saved.reveals[c.id][x].o,
            i: !!saved.reveals[c.id][x].i,
            a: !!saved.reveals[c.id][x].a,
            v: !!saved.reveals[c.id][x].v,
          };
        }
        if (saved.excluded?.[c.id]?.[x] !== undefined) {
          def.excluded[c.id][x] = !!saved.excluded[c.id][x];
        }
        if (saved.examScope?.[c.id]?.[x] !== undefined) {
          def.examScope[c.id][x] = !!saved.examScope[c.id][x];
        }
        x++;
      }));
    });
    if (saved.cards && typeof saved.cards === 'object') {
      Object.keys(saved.cards).forEach(k => {
        const card = saved.cards[k];
        if (card && typeof card === 'object') {
          def.cards[k] = {
            interval: Number(card.interval) || 1,
            dueDate: Number(card.dueDate) || Date.now(),
            lastReviewed: Number(card.lastReviewed) || 0,
            reviews: Number(card.reviews) || 0,
          };
        }
      });
    }
    if (saved.notes && typeof saved.notes === 'object') {
      Object.keys(saved.notes).forEach(k => {
        if (typeof saved.notes[k] === 'string') def.notes[k] = saved.notes[k];
      });
    }
    // Panel state — don't restore review mode mid-session; only restore detail or idle
    def.panel = { open: false, mode: 'detail', detailKey: null };
    return def;
  } catch (e) {
    return defaultState();
  }
}

let state = loadState();

const saveState = (() => {
  let t;
  return () => {
    clearTimeout(t);
    t = setTimeout(() => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    }, 120);
  };
})();

/* ════════════════════════════════════════════════════
   ANNOUNCE / A11y
   ════════════════════════════════════════════════════ */
function announce(msg) {
  const el = document.getElementById('sr-status');
  el.textContent = '';
  setTimeout(() => { el.textContent = msg; }, 50);
}

/* ════════════════════════════════════════════════════
   CATEGORY STATS
   ════════════════════════════════════════════════════ */
function catStats(catId) {
  const cat = DATA.find(c => c.id === catId);
  const cols = state.showInn ? ['o','i','a','v'] : ['o','i','a'];
  let active = 0, total = 0, revealed = 0, excluded = 0, muscles = 0;
  let x = 0;
  cat.s.forEach(s => s.m.forEach(() => {
    muscles++;
    const isEx = state.excluded[catId][x];
    if (isEx) { excluded++; }
    else {
      active++;
      cols.forEach(c => {
        total++;
        if (state.reveals[catId][x][c]) revealed++;
      });
    }
    x++;
  }));
  return { active, total, revealed, excluded, muscles, pct: total ? Math.round(revealed/total*100) : 0 };
}

function allStats() {
  let totRev = 0, totTot = 0, totSkip = 0;
  DATA.forEach(c => {
    const s = catStats(c.id);
    totRev += s.revealed;
    totTot += s.total;
    totSkip += s.excluded;
  });
  return { rev: totRev, tot: totTot, skip: totSkip, pct: totTot ? Math.round(totRev/totTot*100) : 0 };
}

/* ════════════════════════════════════════════════════
   SIDEBAR
   ════════════════════════════════════════════════════ */
function buildSidebar() {
  const nav = document.getElementById('sb-nav');
  nav.innerHTML = '';
  const grps = {};
  DATA.forEach(c => { if (!grps[c.g]) grps[c.g] = []; grps[c.g].push(c); });

  const order = ['Head','Trunk','Upper','Lower'];
  order.forEach(g => {
    if (!grps[g]) return;
    const div = document.createElement('div');
    div.className = 'sb-group';
    const lbl = document.createElement('div');
    lbl.className = 'sb-group-label';
    lbl.innerHTML = `<span>${GROUP_LABELS[g] || g}</span>`;
    lbl.setAttribute('aria-hidden','true');
    div.appendChild(lbl);

    grps[g].forEach(c => {
      const stats = catStats(c.id);
      const btn = document.createElement('button');
      btn.className = 'sb-btn' + (c.id === state.cur ? ' active' : '');
      btn.dataset.id = c.id;
      btn.setAttribute('aria-pressed', c.id === state.cur ? 'true' : 'false');
      btn.setAttribute('aria-label', `${c.lb}, ${stats.muscles} muscles, ${stats.pct}% mastered`);
      btn.innerHTML = `
        <div class="sb-btn-top">
          <span class="sb-dot" style="background:${c._col}" aria-hidden="true"></span>
          <span class="sb-name">${c.lb}</span>
          <span class="sb-count" aria-hidden="true">${stats.muscles}</span>
        </div>
        <div class="sb-progress" aria-hidden="true">
          <div class="sb-progress-fill" style="width:${stats.pct}%"></div>
        </div>
      `;
      btn.addEventListener('click', () => {
        state.cur = c.id;
        state.search = '';
        document.getElementById('search').value = '';
        document.getElementById('search-clear').classList.remove('visible');
        document.querySelectorAll('.sb-btn').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-pressed','false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-pressed','true');
        updateHeader();
        renderTable();
        announce(`Showing ${c.lb}, ${stats.muscles} muscles`);
        saveState();
      });
      div.appendChild(btn);
    });
    nav.appendChild(div);
  });
}

function refreshSidebarStats() {
  document.querySelectorAll('.sb-btn').forEach(btn => {
    const id = btn.dataset.id;
    const stats = catStats(id);
    const fill = btn.querySelector('.sb-progress-fill');
    if (fill) fill.style.width = stats.pct + '%';
    const cat = DATA.find(c => c.id === id);
    btn.setAttribute('aria-label', `${cat.lb}, ${stats.muscles} muscles, ${stats.pct}% mastered`);
  });
  const all = allStats();
  document.getElementById('foot-rev').textContent = all.rev;
  document.getElementById('foot-skip').textContent = all.skip;
  document.getElementById('foot-pct').textContent = all.pct + '%';
}

/* ════════════════════════════════════════════════════

function updateHeader() {
  const cat = DATA.find(c => c.id === state.cur);
  document.getElementById('cat-title').textContent = cat.lb;
  document.getElementById('cat-eyebrow').textContent = GROUP_LABELS[cat.g] || cat.g;
  document.getElementById('cat-subtitle').textContent = cat.sub || '';
}

/* ════════════════════════════════════════════════════
   TABLE
   ════════════════════════════════════════════════════ */
function renderTable() {
  const cat = DATA.find(c => c.id === state.cur);
  const wrap = document.getElementById('table-wrap');
  wrap.innerHTML = '';
  const hc = state.showInn ? '' : ' hide-col';
  const searchQ = state.search.trim().toLowerCase();

  let gi = 0;
  let anyVisible = false;

  cat.s.forEach(sec => {
    // Count visible muscles in this section
    const startGi = gi;
    const visibleInSection = sec.m.filter((m, idx) => {
      const globalIdx = startGi + idx;
      const isExcl = state.excluded[state.cur][globalIdx];
      if (state.hideExcl && isExcl) return false;
      if (searchQ && !m.n.toLowerCase().includes(searchQ)) return false;
      return true;
    });

    if (visibleInSection.length === 0) {
      gi += sec.m.length;
      return;
    }
    anyVisible = true;

    const sectionHeader = document.createElement('div');
    sectionHeader.className = 'section-header';
    sectionHeader.setAttribute('role','heading');
    sectionHeader.setAttribute('aria-level','2');
    sectionHeader.innerHTML = `
      <span class="section-title">${sec.t}</span>
      <span class="section-count">${visibleInSection.length} of ${sec.m.length}</span>
    `;
    wrap.appendChild(sectionHeader);

    const tblWrap = document.createElement('div');
    tblWrap.style.overflowX = 'auto';
    const tbl = document.createElement('table');
    tbl.setAttribute('role','table');
    tbl.setAttribute('aria-label', sec.t);
    tbl.innerHTML = `<thead role="rowgroup"><tr role="row">
      <th scope="col" style="text-align:center;">On list?</th>
      <th scope="col" class="muscle-col">Muscle</th>
      <th scope="col" class="col-o">Origin</th>
      <th scope="col" class="col-i">Insertion</th>
      <th scope="col" class="col-a">Action</th>
      <th scope="col" class="col-n${hc}">Innervation</th>
    </tr></thead>`;
    const tbody = document.createElement('tbody');
    tbody.setAttribute('role','rowgroup');
    tbl.appendChild(tbody);
    tblWrap.appendChild(tbl);
    wrap.appendChild(tblWrap);

    sec.m.forEach(m => {
      const idx = gi++;
      const r = state.reveals[state.cur][idx];
      const isExcl = state.excluded[state.cur][idx];

      if (state.hideExcl && isExcl) return;
      if (searchQ && !m.n.toLowerCase().includes(searchQ)) return;

      const tr = document.createElement('tr');
      tr.setAttribute('role','row');
      if (isExcl) tr.classList.add('excluded');

      // Skip toggle
      const skipTd = document.createElement('td');
      skipTd.className = 'skip-col';
      const togglesWrap = document.createElement('div');
      togglesWrap.className = 'row-toggles';

      const thisKey = cardKey(state.cur, idx);
      const isActiveDetail = state.panel.open && state.panel.mode === 'detail' && state.panel.detailKey === thisKey;

      // Skip button
      const skipBtn = document.createElement('button');
      skipBtn.className = 'row-toggle-btn skip-btn' + (isExcl ? ' checked' : '');
      skipBtn.setAttribute('aria-pressed', isExcl ? 'true' : 'false');
      skipBtn.setAttribute('aria-label', isExcl ? `${m.n}: marked as skipped. Click to include.` : `${m.n}: skip (not on my list)`);
      skipBtn.setAttribute('title', isExcl ? 'Click to include this muscle' : 'Skip — not on my list');
      skipBtn.innerHTML = '<span class="pill-dot" aria-hidden="true"></span><span>Skip</span>';
      skipBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const newVal = !state.excluded[state.cur][idx];
        state.excluded[state.cur][idx] = newVal;
        announce(newVal ? `${m.n} marked as skipped` : `${m.n} included again`);
        renderTable();
        refreshSidebarStats();
        updateScore();
        saveState();
      });
      togglesWrap.appendChild(skipBtn);

      skipTd.appendChild(togglesWrap);
      tr.appendChild(skipTd);

      // Muscle name (clickable to open detail panel)
      const nameTd = document.createElement('td');
      nameTd.setAttribute('role','rowheader');
      const nameDiv = document.createElement('div');
      nameDiv.className = 'muscle-name' + (isActiveDetail ? ' active-detail' : '');
      nameDiv.setAttribute('role', 'button');
      nameDiv.setAttribute('tabindex', '0');
      nameDiv.setAttribute('aria-label', `${m.n} — open detail panel`);
      nameDiv.innerHTML = `<span class="row-dot" style="background:${cat._col}" aria-hidden="true"></span><span class="muscle-name-text">${m.n}</span>`;
      const openDetail = () => {
        state.panel.detailKey = thisKey;
        openPanel('detail');
        renderTable(); // refresh to highlight
      };
      nameDiv.addEventListener('click', openDetail);
      nameDiv.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDetail(); }
      });
      nameTd.appendChild(nameDiv);
      tr.appendChild(nameTd);

      // Cells
      [['o','col-o',m.o],['i','col-i',m.i],['a','col-a',m.a],['v','col-n'+hc,m.v]].forEach(([key, cls, val]) => {
        const td = document.createElement('td');
        td.className = cls;
        td.setAttribute('role','cell');
        const isRev = r[key];
        const btn = document.createElement('button');
        btn.className = 'cell-btn' + (isRev ? ' revealed' : '');
        btn.textContent = val;
        btn.setAttribute('aria-label', isRev ? `${m.n} ${COL_LABELS[key]}: ${val}` : `${m.n} ${COL_LABELS[key]}: hidden, press to reveal`);
        btn.setAttribute('aria-expanded', isRev ? 'true' : 'false');
        if (isRev) btn.setAttribute('aria-disabled', 'true');
        btn.dataset.col = key;
        btn.dataset.idx = idx;
        btn.addEventListener('click', function() {
          if (!state.quizMode || state.reveals[state.cur][idx][key]) return;
          state.reveals[state.cur][idx][key] = true;
          this.classList.add('revealed');
          this.setAttribute('aria-label', `${m.n} ${COL_LABELS[key]}: ${val}`);
          this.setAttribute('aria-expanded', 'true');
          this.setAttribute('aria-disabled', 'true');
          announce(`${m.n} ${COL_LABELS[key]}: ${val}`);
          updateScore();
          refreshSidebarStats();
          saveState();
        });
        td.appendChild(btn);
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
  });

  if (!anyVisible) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = '<div class="ico">—</div>No muscles match your filter.';
    wrap.appendChild(empty);
  }

  updateScore();
}

/* ════════════════════════════════════════════════════
   PROGRESS
   ════════════════════════════════════════════════════ */
function updateScore() {
  const s = catStats(state.cur);
  const txt = `${s.revealed} of ${s.total} revealed`;
  document.getElementById('score-txt').textContent = txt;
  document.getElementById('prog-fill').style.width = s.pct + '%';
  document.getElementById('pct-txt').textContent = s.pct + '%';
  const bar = document.getElementById('prog-track');
  bar.setAttribute('aria-valuenow', s.pct);
  bar.setAttribute('aria-valuetext', txt);
}

/* ════════════════════════════════════════════════════
   SPACED REPETITION — scheduling + queue
   ════════════════════════════════════════════════════ */
const DAY_MS = 24 * 60 * 60 * 1000;

function cardKey(catId, idx) { return catId + ':' + idx; }
function parseKey(k) { const i = k.indexOf(':'); return [k.slice(0, i), Number(k.slice(i + 1))]; }

function getMuscle(catId, idx) {
  const cat = DATA.find(c => c.id === catId);
  if (!cat) return null;
  let gi = 0;
  for (const sec of cat.s) {
    for (const m of sec.m) {
      if (gi === idx) return { muscle: m, cat, section: sec, idx };
      gi++;
    }
  }
  return null;
}

function computeXrefs(forMuscle, forCatId, forIdx) {
  // Same nerve (exact match on v field)
  const sameNerve = [];
  DATA.forEach(cat => {
    let gi = 0;
    cat.s.forEach(sec => sec.m.forEach(m => {
      if (!(cat.id === forCatId && gi === forIdx)) {
        if (m.v === forMuscle.v) sameNerve.push({ m, cat, idx: gi });
      }
      gi++;
    }));
  });
  return { sameNerve };
}

/* ════════════════════════════════════════════════════
   RIGHT PANEL — rendering & state
   ════════════════════════════════════════════════════ */
function openPanel(mode, opts) {
  state.panel.open = true;
  state.panel.mode = mode || 'detail';
  if (opts && opts.detailKey) state.panel.detailKey = opts.detailKey;
  document.getElementById('right-panel').classList.add('open');
  renderPanel();
  saveState();
}

function closePanel() {
  state.panel.open = false;
  document.getElementById('right-panel').classList.remove('open');
  // Refresh table to clear any active-detail highlight
  renderTable();
  saveState();
}

function renderPanel() {
  const titleEl = document.getElementById('rp-title');
  const contentEl = document.getElementById('rp-content');
  titleEl.textContent = 'Muscle Detail';
  contentEl.innerHTML = renderDetailHTML();
  wireDetailHandlers();
}

/* ── Detail mode HTML ── */
function renderDetailHTML() {
  const k = state.panel.detailKey;
  if (!k) return '<div class="rp-body"><div class="rp-xref-empty">No muscle selected.</div></div>';
  const [catId, idx] = parseKey(k);
  const info = getMuscle(catId, idx);
  if (!info) return '<div class="rp-body"><div class="rp-xref-empty">Muscle not found.</div></div>';
  const { muscle, cat } = info;
  const noteVal = state.notes[k] || '';
  const xrefs = computeXrefs(muscle, catId, idx);

  const sameNerveHTML = xrefs.sameNerve.length
    ? `<ul class="rp-xref">${xrefs.sameNerve.map(x => `
        <li class="rp-xref-item" data-jump="${cardKey(x.cat.id, x.idx)}">
          <span>${x.m.n}</span>
          <span class="rp-xref-cat">${x.cat.lb}</span>
        </li>
      `).join('')}</ul>`
    : `<div class="rp-xref-empty">No other muscles in the dataset share this innervation.</div>`;

  return `<div class="rp-body">
    <div class="rp-detail-loc">${GROUP_LABELS[cat.g] || cat.g} · ${cat.lb}</div>
    <h2 class="rp-detail-name">${muscle.n}</h2>

    <div class="rp-field f-o">
      <div class="rp-field-label">Origin</div>
      <div class="rp-field-text">${muscle.o}</div>
    </div>
    <div class="rp-field f-i">
      <div class="rp-field-label">Insertion</div>
      <div class="rp-field-text">${muscle.i}</div>
    </div>
    <div class="rp-field f-a">
      <div class="rp-field-label">Action</div>
      <div class="rp-field-text">${muscle.a}</div>
    </div>
    <div class="rp-field f-n">
      <div class="rp-field-label">Innervation</div>
      <div class="rp-field-text">${muscle.v}</div>
    </div>

    <div class="rp-section-h">Notes &amp; Mnemonics</div>
    <textarea class="rp-notes-ta" id="rp-notes" placeholder="Add a memory hook, clinical note, or anything that helps you remember…">${escapeHTML(noteVal)}</textarea>

    <div class="rp-section-h">Same Innervation</div>
    ${sameNerveHTML}
  </div>`;
}

function escapeHTML(s) {
  return s.replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function wireDetailHandlers() {
  const notesEl = document.getElementById('rp-notes');
  if (notesEl) {
    let t;
    notesEl.addEventListener('input', function() {
      const v = this.value;
      clearTimeout(t);
      t = setTimeout(() => {
        if (v) state.notes[state.panel.detailKey] = v;
        else delete state.notes[state.panel.detailKey];
        saveState();
      }, 200);
    });
  }
  document.querySelectorAll('.rp-xref-item[data-jump]').forEach(item => {
    item.addEventListener('click', () => {
      const k = item.dataset.jump;
      const [catId] = parseKey(k);
      if (catId !== state.cur) {
        state.cur = catId;
        document.querySelectorAll('.sb-btn').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-pressed', 'false');
          if (b.dataset.id === catId) {
            b.classList.add('active');
            b.setAttribute('aria-pressed', 'true');
          }
        });
        updateHeader();
      }
      state.panel.detailKey = k;
      renderPanel();
      renderTable();
      saveState();
    });
  });
}

/* ════════════════════════════════════════════════════
   EVENT HANDLERS
   ════════════════════════════════════════════════════ */
const qt = document.getElementById('qt');
qt.checked = state.quizMode;
document.body.classList.toggle('study', !state.quizMode);
qt.addEventListener('change', function() {
  state.quizMode = this.checked;
  document.body.classList.toggle('study', !state.quizMode);
  if (!state.quizMode) {
    // Reveal all in current category for study mode display
    Object.keys(state.reveals[state.cur]).forEach(k => ['o','i','a','v'].forEach(c => state.reveals[state.cur][k][c] = true));
    announce('Study mode — all answers visible');
  } else {
    announce('Quiz mode — click cells to reveal');
  }
  renderTable();
  refreshSidebarStats();
  saveState();
});

const it = document.getElementById('it');
it.checked = state.showInn;
it.addEventListener('change', function() {
  state.showInn = this.checked;
  renderTable();
  refreshSidebarStats();
  announce(state.showInn ? 'Innervation column shown' : 'Innervation column hidden');
  saveState();
});

const ht = document.getElementById('ht');
ht.checked = state.hideExcl;
ht.addEventListener('change', function() {
  state.hideExcl = this.checked;
  renderTable();
  announce(state.hideExcl ? 'Skipped muscles hidden' : 'Skipped muscles shown');
  saveState();
});

document.getElementById('ra').addEventListener('click', () => {
  Object.keys(state.reveals[state.cur]).forEach(k => {
    if (state.excluded[state.cur][k]) return;
    ['o','i','a','v'].forEach(c => state.reveals[state.cur][k][c] = true);
  });
  renderTable();
  refreshSidebarStats();
  announce('All cells revealed in this category');
  saveState();
});

document.getElementById('ha').addEventListener('click', () => {
  Object.keys(state.reveals[state.cur]).forEach(k => ['o','i','a','v'].forEach(c => state.reveals[state.cur][k][c] = false));
  renderTable();
  refreshSidebarStats();
  announce('All cells hidden in this category');
  saveState();
});

document.getElementById('reset-cat-btn').addEventListener('click', () => {
  const cat = DATA.find(c => c.id === state.cur);
  if (!confirm(`Reset progress for "${cat.lb}"? Clears your reveals and skip marks for this category only.\n\nYour saved notes are preserved.`)) return;
  Object.keys(state.reveals[state.cur]).forEach(k => {
    ['o','i','a','v'].forEach(c => state.reveals[state.cur][k][c] = false);
    state.excluded[state.cur][k] = false;
  });
  renderTable();
  refreshSidebarStats();
  if (state.panel.open) renderPanel();
  announce(`${cat.lb} progress reset`);
  saveState();
});

document.getElementById('reset-all-btn').addEventListener('click', () => {
  if (!confirm('Reset all progress? Clears reveals and skip marks across every category, and resets display toggles.\n\nYour saved notes are preserved.')) return;
  DATA.forEach(c => {
    Object.keys(state.reveals[c.id]).forEach(k => {
      ['o','i','a','v'].forEach(col => state.reveals[c.id][k][col] = false);
      state.excluded[c.id][k] = false;
    });
  });
  state.quizMode = true;
  state.showInn = true;
  state.hideExcl = false;
  state.search = '';
  document.getElementById('qt').checked = true;
  document.getElementById('it').checked = true;
  document.getElementById('ht').checked = false;
  document.getElementById('search').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  document.body.classList.toggle('study', false);
  renderTable();
  refreshSidebarStats();
  if (state.panel.open) renderPanel();
  announce('All progress reset');
  saveState();
});

/* Search */
const searchEl = document.getElementById('search');
const searchClear = document.getElementById('search-clear');
searchEl.addEventListener('input', function() {
  state.search = this.value;
  searchClear.classList.toggle('visible', !!this.value);
  renderTable();
});
searchClear.addEventListener('click', () => {
  searchEl.value = '';
  state.search = '';
  searchClear.classList.remove('visible');
  renderTable();
  searchEl.focus();
});

/* Keyboard: '/' to focus search */
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchEl && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    searchEl.focus();
  }
  if (e.key === 'Escape' && document.activeElement === searchEl) {
    searchEl.value = '';
    state.search = '';
    searchClear.classList.remove('visible');
    renderTable();
    searchEl.blur();
  }
});

/* ════════════════════════════════════════════════════
   PANEL EVENT HANDLERS
   ════════════════════════════════════════════════════ */
document.getElementById('rp-close').addEventListener('click', closePanel);

// Esc closes panel (unless typing in a field)
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && state.panel.open) {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    closePanel();
  }
});

/* ════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════ */
buildSidebar();
updateHeader();
renderTable();
refreshSidebarStats();
// Restore the detail panel if it was open
if (state.panel.open && state.panel.mode === 'detail' && state.panel.detailKey) {
  document.getElementById('right-panel').classList.add('open');
  renderPanel();
} else {
  state.panel.open = false;
}
</script>
</body>
</html>
