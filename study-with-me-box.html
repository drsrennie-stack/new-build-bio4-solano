<!--
  "Study With Me" hub block, BIO 004
  Two lifted square tiles in the deep brick terracotta, sized to sit next to
  your Lab / Other tools / Recall Rx blocks on a weekly hub.

  HOW TO ADD IT TO A HUB:
  Paste everything between the two ==== lines below into the hub, INSIDE the
  <div class="weektools"> ... </div> group, right after the Lab block
  (the <section class="wt-block wt-lab"> ... </section>).
  Both tiles link to the same schedule page; the student picks host or join there.
  To change where they go, edit the two href values.
-->
<!-- ===== START: Study With Me block ===== -->
<section class="swm-block" aria-label="Study With Me, student-run study sessions">
  <style>
    @import url('https://cdn.jsdelivr.net/npm/@fontsource-variable/plus-jakarta-sans/index.css');
    .swm-block{margin:0;font-family:'Plus Jakarta Sans Variable','Plus Jakarta Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    .swm-head{font-weight:700;font-size:11px;letter-spacing:.18em;text-transform:uppercase;margin:0 0 10px;color:#8B3A2E;font-family:inherit}
    .swm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;max-width:500px}
    .swm-tile{aspect-ratio:1/1;background:#7E2E1C;border-radius:12px;padding:18px;display:flex;flex-direction:column;justify-content:space-between;text-decoration:none;color:#fff;box-shadow:0 12px 26px rgba(11,21,48,.24);transition:transform .18s ease,box-shadow .18s ease,background .18s ease;font-family:inherit}
    .swm-tile:hover,.swm-tile:focus-visible{transform:translateY(-5px);box-shadow:0 20px 38px rgba(11,21,48,.32);background:#6A2415;outline:none}
    .swm-tile:focus-visible{outline:3px solid #C9A14A;outline-offset:3px}
    .swm-title{font-weight:800;font-size:24px;line-height:1.12;letter-spacing:-.01em;margin:0;color:#fff}
    .swm-title .hw{color:#0B1530;-webkit-text-stroke:2.5px #fff;paint-order:stroke fill;text-shadow:0 0 1px #fff}
    .swm-sub{font-weight:600;font-size:13px;color:rgba(255,255,255,.9);margin:6px 0 0;line-height:1.4}
    .swm-go{font-weight:800;font-size:13px;color:#EAD08A;margin-top:auto;letter-spacing:.02em}
    @media(prefers-reduced-motion:reduce){.swm-tile{transition:none}.swm-tile:hover{transform:none}}
  </style>
  <p class="swm-head">Study With Me &middot; student-run sessions</p>
  <div class="swm-grid">
    <a class="swm-tile" href="https://www.medmasterscollaborative.com/student-hosting-schedule" target="_top" aria-label="Host a Study With Me session">
      <span class="swm-title"><span class="hw">Host</span> a session</span>
      <span class="swm-sub">Lead your own. Your topic, your time, online or in person.</span>
      <span class="swm-go" aria-hidden="true">Open the schedule &rarr;</span>
    </a>
    <a class="swm-tile" href="https://www.medmasterscollaborative.com/student-hosting-schedule" target="_top" aria-label="Join a Study With Me session">
      <span class="swm-title"><span class="hw">Join</span> a session</span>
      <span class="swm-sub">Grab a seat with a classmate and study together.</span>
      <span class="swm-go" aria-hidden="true">See what's open &rarr;</span>
    </a>
  </div>
</section>
<!-- ===== END: Study With Me block ===== -->
