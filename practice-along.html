<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Along · BIO 004</title>
<style>
:root {
  --navy: #0B1530;
  --navy-dark: #060A18;
  --rust: #8B3A2E;
  --rust-hover: #A0452F;
  --gold: #C9A14A;
  --white: #FFFFFF;
  --cream: #FAFAF9;
  --off-white: #F8F8F8;
  --text-muted: #5A6478;
  --rule: rgba(11,21,48,0.10);
  --rule-strong: rgba(11,21,48,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; }
body {
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  background: var(--white);
  color: var(--navy);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ---- HEADER ---- */
.header {
  height: 56px;
  background: var(--white);
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand .tag {
  background: var(--rust);
  color: var(--white);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 20px;
}
.brand .title {
  font-weight: 800;
  font-size: 15px;
  color: var(--navy);
  letter-spacing: -0.01em;
}
.brand .title .accent { color: var(--rust); }
.label {
  font-size: 12.5px;
  color: var(--navy);
  opacity: 0.65;
  font-weight: 500;
}
.spacer { flex: 1; }
.controls { display: flex; gap: 8px; }

.header button {
  background: var(--white);
  color: var(--navy);
  border: 1px solid var(--rule-strong);
  padding: 7px 14px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.header button:hover {
  background: var(--rust);
  color: var(--white);
  border-color: var(--rust);
}
.header button.primary {
  background: var(--rust);
  color: var(--white);
  border-color: var(--rust);
}
.header button.primary:hover {
  background: var(--rust-hover);
  border-color: var(--rust-hover);
}

/* ---- SPLIT PANES ---- */
.split {
  display: flex;
  height: calc(100vh - 56px);
  width: 100%;
  position: relative;
  background: var(--off-white);
}
.pane {
  background: var(--white);
  overflow: hidden;
  position: relative;
  flex: 1 1 50%;
  min-width: 0;
}
.pane iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}
.pane-label {
  position: absolute;
  top: 10px;
  left: 10px;
  background: var(--white);
  color: var(--rust);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid var(--rule);
  border-radius: 3px;
  pointer-events: none;
  z-index: 10;
  box-shadow: 0 1px 3px rgba(11,21,48,0.06);
}

/* ---- DIVIDER ---- */
.divider {
  width: 8px;
  background: var(--off-white);
  border-left: 1px solid var(--rule);
  border-right: 1px solid var(--rule);
  cursor: ew-resize;
  flex-shrink: 0;
  position: relative;
  transition: background 0.15s;
}
.divider:hover, .divider.dragging {
  background: var(--cream);
}
.divider::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 3px;
  height: 36px;
  background: var(--rust);
  border-radius: 2px;
  opacity: 0.55;
}

/* ---- PLACEHOLDER ---- */
.placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  flex-direction: column;
  gap: 14px;
  background: var(--off-white);
  color: var(--navy);
  padding: 32px;
  text-align: center;
}
.placeholder .icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--white);
  border: 2px solid var(--rust);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  color: var(--rust);
}
.placeholder h2 {
  font-size: 16px;
  color: var(--rust);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.placeholder p {
  max-width: 380px;
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--navy);
  opacity: 0.78;
}
.placeholder code {
  background: var(--white);
  padding: 2px 8px;
  border: 1px solid var(--rule);
  border-radius: 3px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  color: var(--rust);
}

/* ---- MOBILE: stack panes vertically ---- */
@media (max-width: 820px) {
  .header { padding: 0 12px; gap: 8px; height: 52px; }
  .label { display: none; }
  .header button { padding: 6px 10px; font-size: 10px; }
  .split { flex-direction: column; height: calc(100vh - 52px); }
  .divider {
    width: 100%;
    height: 8px;
    cursor: ns-resize;
    border-left: 0;
    border-right: 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .divider::after {
    width: 36px;
    height: 3px;
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <span class="tag">Practice</span>
    <span class="title">Draw <span class="accent">Along</span></span>
  </div>
  <span class="label" id="topic-label"></span>
  <span class="spacer"></span>
  <div class="controls">
    <button id="swap-btn" title="Swap left and right panes">Swap sides</button>
    <button id="reset-btn" title="Reset to 50/50 split">Reset 50/50</button>
    <button id="full-case-btn" class="primary" title="Open the case page on its own in a new tab">Case full screen</button>
  </div>
</div>

<div class="split" id="split">
  <div class="pane" id="left-pane">
    <span class="pane-label" id="left-label">Video</span>
  </div>
  <div class="divider" id="divider" role="separator" aria-label="Resize panes"></div>
  <div class="pane" id="right-pane">
    <span class="pane-label" id="right-label">Case &amp; Drawing</span>
  </div>
</div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var videoUrl = params.get('video');
  var caseUrl = params.get('case');
  var topic = params.get('topic');

  var leftPane = document.getElementById('left-pane');
  var rightPane = document.getElementById('right-pane');
  var leftLabel = document.getElementById('left-label');
  var rightLabel = document.getElementById('right-label');
  var topicLabel = document.getElementById('topic-label');
  var fullCaseBtn = document.getElementById('full-case-btn');

  if (topic) topicLabel.textContent = decodeURIComponent(topic);

  function makeIframe(src, allow) {
    var f = document.createElement('iframe');
    f.src = src;
    if (allow) f.setAttribute('allow', allow);
    f.setAttribute('allowfullscreen', '');
    return f;
  }
  function makePlaceholder(icon, title, body) {
    var d = document.createElement('div');
    d.className = 'placeholder';
    d.innerHTML = '<div class="icon">' + icon + '</div><h2>' + title + '</h2><p>' + body + '</p>';
    return d;
  }

  if (videoUrl) {
    leftPane.appendChild(makeIframe(videoUrl, 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share'));
  } else {
    leftPane.appendChild(makePlaceholder(
      '▶',
      'No video URL',
      'Add <code>?video=YOUR_VIDEO_EMBED_URL</code> to the page URL to embed the deep-dive video here.'
    ));
  }

  if (caseUrl) {
    rightPane.appendChild(makeIframe(caseUrl));
    fullCaseBtn.addEventListener('click', function () {
      window.open(caseUrl, '_blank', 'noopener');
    });
  } else {
    rightPane.appendChild(makePlaceholder(
      '✎',
      'No case URL',
      'Add <code>&case=YOUR_CASE_HTML_URL</code> to the page URL to embed the case deep-dive here.'
    ));
    fullCaseBtn.style.display = 'none';
  }

  document.getElementById('swap-btn').addEventListener('click', function () {
    var leftKids = Array.from(leftPane.childNodes);
    var rightKids = Array.from(rightPane.childNodes);
    leftPane.innerHTML = '';
    rightPane.innerHTML = '';
    leftPane.appendChild(leftLabel);
    rightPane.appendChild(rightLabel);
    rightKids.forEach(function (n) { if (n !== rightLabel) leftPane.appendChild(n); });
    leftKids.forEach(function (n) { if (n !== leftLabel) rightPane.appendChild(n); });
  });

  document.getElementById('reset-btn').addEventListener('click', function () {
    leftPane.style.flex = '1 1 50%';
    rightPane.style.flex = '1 1 50%';
  });

  var divider = document.getElementById('divider');
  var split = document.getElementById('split');
  var dragging = false;

  function startDrag(e) {
    dragging = true;
    divider.classList.add('dragging');
    document.body.style.userSelect = 'none';
    leftPane.style.pointerEvents = 'none';
    rightPane.style.pointerEvents = 'none';
    if (e.cancelable) e.preventDefault();
  }
  function endDrag() {
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.userSelect = '';
    leftPane.style.pointerEvents = '';
    rightPane.style.pointerEvents = '';
  }
  function onMove(clientX, clientY) {
    if (!dragging) return;
    var rect = split.getBoundingClientRect();
    var isMobile = window.innerWidth <= 820;
    if (isMobile) {
      var y = clientY - rect.top;
      var pct = Math.max(10, Math.min(90, (y / rect.height) * 100));
      leftPane.style.flex = '0 0 ' + pct + '%';
      rightPane.style.flex = '1 1 auto';
    } else {
      var x = clientX - rect.left;
      var pct2 = Math.max(10, Math.min(90, (x / rect.width) * 100));
      leftPane.style.flex = '0 0 ' + pct2 + '%';
      rightPane.style.flex = '1 1 auto';
    }
  }

  divider.addEventListener('mousedown', startDrag);
  divider.addEventListener('touchstart', startDrag, { passive: false });
  document.addEventListener('mousemove', function (e) { onMove(e.clientX, e.clientY); });
  document.addEventListener('touchmove', function (e) {
    if (!dragging) return;
    var t = e.touches[0];
    onMove(t.clientX, t.clientY);
    e.preventDefault();
  }, { passive: false });
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchend', endDrag);
  document.addEventListener('touchcancel', endDrag);
})();
</script>

</body>
</html>
